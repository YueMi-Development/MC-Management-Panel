# Configuration version - DO NOT CHANGE THIS MANUALLY
config-version: 4

# Active handler for executing player punishments.
# Supported values:
# - "vanilla"    : Uses the standard Bukkit/Paper APIs (no support for mutes/warns)
# - "essentials" : Delegates to EssentialsX plugin commands
punishment-handler: "vanilla"

# Wipe and backup settings
wipe:
  # Whether players should be automatically wiped when banned
  auto-wipe-on-ban: false

  # Whether to create backups of player data before performing a wipe
  enable-backups: true

  # The directory where backups will be stored (relative to the plugin's data folder)
  backup-directory: "backups"

  # Granular controls for what should be wiped.
  # Define which handler to use for each category. Set to "none" to disable.
  handlers:
    # Supported: "vanilla" (deletes .dat file, wiping inventory, health, location, etc.), "none"
    inventory: "vanilla"
    
    # Supported: "vanilla", "none"
    enderchest: "vanilla"
    
    # Supported: "yuemi" (requires YueMiLibs), "essentials", "none"
    economy: "yuemi"
